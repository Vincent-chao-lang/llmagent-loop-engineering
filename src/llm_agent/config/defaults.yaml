# LLM Agent框架默认配置
# 此文件随包分发，可作为配置模板使用

# LLM提供商配置
llm_provider: mock  # mock, anthropic, openai
llm_model: llm-agent-model
llm_api_key: null  # 设置为 ${LLM_AGENT_API_KEY} 从环境变量读取

# API服务配置
api_host: "0.0.0.0"
api_port: 8000
api_workers: 1

# 会话管理
session_ttl: 3600  # 会话过期时间（秒），默认1小时
max_sessions: 100  # 最大并发会话数

# 记忆系统配置
memory_short_term_capacity: 100
memory_long_term_capacity: 1000
memory_working_capacity: 10

# CORS配置
cors_origins:
  - "http://localhost:3000"
  - "http://localhost:8080"
cors_allow_methods:
  - "GET"
  - "POST"
  - "PUT"
  - "DELETE"
  - "OPTIONS"
cors_allow_headers:
  - "*"
